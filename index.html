<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lunaria Fox Dashboard</title>
  <link rel="stylesheet" href="./style.css?v=1" />
</head>
<body>
  <div class="bg"></div>

  <main class="wrap">
    <header class="top">
      <div class="brand">
        <div class="moon">🌙</div>
        <div>
          <div class="title">Lunaria Fox Dashboard</div>
          <div class="subtitle">Discord • Supabase • Cloudflare</div>
        </div>
      </div>

      <div id="userBox" class="userbox hidden">
        <img id="avatar" class="avatar" alt="avatar" />
        <div class="uinfo">
          <div id="username" class="uname"></div>
          <div id="userid" class="uid"></div>
        </div>
        <button id="logoutBtn" class="btn ghost">Выйти</button>
      </div>
    </header>

    <section class="card">
      <div id="view"></div>
    </section>

    <footer class="foot">
      <div class="tiny">Lunaria Fox • dashboard MVP</div>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./app.js?v=20260305_3"></script>
</body>
</html>
