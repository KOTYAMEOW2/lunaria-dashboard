<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lunaria Fox Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <meta name="color-scheme" content="dark" />
</head>
<body>
  <main class="page">
    <section class="card">
      <header class="hero">
        <div class="moon">🌙</div>
        <div>
          <h1>Lunaria Fox<br/>Dashboard</h1>
          <p class="sub">Welcome to the control panel for Lunaria.</p>
        </div>
      </header>

      <div id="notice" class="notice hidden"></div>

      <div id="authView" class="stack">
        <button id="btnLogin" class="btn primary">Login with Discord</button>
        <p class="hint">
          После логина мы покажем список гильдий, где у тебя есть управление (owner / Manage Server).
        </p>
      </div>

      <div id="appView" class="stack hidden">
        <div class="row between">
          <div class="me">
            <div class="avatar" id="meAvatar" aria-hidden="true"></div>
            <div class="meText">
              <div class="meTitle">Ты вошла как <span id="meName">—</span></div>
              <div class="meSub" id="meId">—</div>
            </div>
          </div>
          <button id="btnLogout" class="btn ghost">Выйти</button>
        </div>

        <div class="section">
          <div class="sectionTitle">Гильдии</div>
          <div class="sectionSub">Только те, где ты owner или у тебя есть <b>Manage Server</b>.</div>
          <div id="guilds" class="guilds">
            <div class="skeleton">Загружаю…</div>
          </div>
        </div>

        <footer class="foot">
          <span class="muted">Lunaria Fox • Dashboard</span>
        </footer>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
