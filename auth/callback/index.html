<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авторизация — Lunaria Fox</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0b1a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      max-width: 520px;
      width: 100%;
      background: #1a1330;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 24px;
    }

    .error {
      color: #ff9ca8;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Lunaria Fox Dashboard</h1>
    <p id="status">Завершаем авторизацию...</p>
    <div id="error" class="error"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://hqggzsfcswtqgwejblxe.supabase.co";
    const SUPABASE_KEY = "sb_publishable_6AmJxlgJz9BN47fIagW5lg_zjxAguyd";
    const DASHBOARD_URL = "https://lunaria-dashboard.pages.dev";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    (async () => {
      const status = document.getElementById("status");
      const errorBox = document.getElementById("error");

      try {
        const url = new URL(window.location.href);
        const code = url.searchParams.get("code");

        if (!code) {
          status.textContent = "Код авторизации не найден.";
          return;
        }

        const { error } = await supabase.auth.exchangeCodeForSession(code);

        if (error) {
          status.textContent = "Ошибка авторизации.";
          errorBox.textContent = error.message;
          return;
        }

        status.textContent = "Успешно. Перенаправляем...";
        window.location.href = `${DASHBOARD_URL}/`;
      } catch (e) {
        status.textContent = "Ошибка callback.";
        errorBox.textContent = e.message || String(e);
      }
    })();
  </script>
</body>
</html>
