<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авторизация — Lunaria Fox</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <h1>Lunaria Fox Dashboard</h1>
    <p>Завершаем авторизацию...</p>
    <div id="status" class="card">Проверка callback...</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      var SUPABASE_URL = "https://hqggzsfcswtqgwejblxe.supabase.co";
      var SUPABASE_KEY = "sb_publishable_6AmJxlgJz9BN47fIagW5lg_zjxAguyd";
      var statusEl = document.getElementById("status");

      function setStatus(title, text) {
        if (!statusEl) return;
        statusEl.innerHTML =
          "<h2>" + escapeHtml(title) + "</h2>" +
          "<p>" + escapeHtml(text) + "</p>";
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      if (!window.supabase || typeof window.supabase.createClient !== "function") {
        setStatus("Ошибка", "Supabase library is not loaded.");
        return;
      }

      var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      async function finishAuth() {
        try {
          var url = new URL(window.location.href);
          var code = url.searchParams.get("code");
          var errorDescription = url.searchParams.get("error_description");
          var errorCode = url.searchParams.get("error");

          if (errorCode || errorDescription) {
            setStatus("Ошибка авторизации", errorDescription || errorCode || "OAuth error");
            return;
          }

          if (!code) {
            setStatus("Ошибка", "В callback URL нет параметра code.");
            return;
          }

          setStatus("Авторизация", "Обмениваем code на session...");

          var result = await supabase.auth.exchangeCodeForSession(code);

          if (result.error) {
            setStatus("Ошибка обмена", result.error.message || "exchangeCodeForSession failed");
            return;
          }

          setStatus("Успешно", "Перенаправляем в dashboard...");
          window.location.replace("/");
        } catch (error) {
          setStatus("Ошибка", error && error.message ? error.message : String(error));
        }
      }

      finishAuth();
    })();
  </script>
</body>
</html>
